spring.application.name=mocapi-demo
spring.threads.virtual.enabled=true

mocapi.server-title=Meridian service catalog demo

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Liquibase owns the catalog schema (service / team / dependency / service_tag).
# Substrate-postgresql creates its own session-state tables at startup;
# auto-create-schema defaults to true on atom/journal/mailbox already, so we
# only override if we ever want to manage those tables externally. The
# notifier uses Postgres LISTEN/NOTIFY and doesn't need a schema.
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

management.endpoints.web.exposure.include=health,info,mcp

# ---------------------------------------------------------------------------
# Tracing — Spring Boot 4 properties (not the raw OTel SDK env-var names).
# Sampling probability 1.0 = all spans get kept; dial down in prod via the
# MANAGEMENT_TRACING_SAMPLING_PROBABILITY env var. The OTLP endpoint points
# at the local OTel collector sidecar (configured via OTEL_EXPORTER_OTLP_
# ENDPOINT env var in the ACA template; default used here for local dev).
# ---------------------------------------------------------------------------
management.tracing.export.enabled=true
management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces
management.opentelemetry.tracing.export.otlp.transport=http
management.info.build.enabled=true
management.info.git.enabled=true
management.info.git.mode=full

server.forward-headers-strategy=framework

# ---------------------------------------------------------------------------
# OAuth2 resource-server protection for the MCP endpoint.
#
# Defaults point at the local Keycloak container (started by compose.yaml with
# the mocapi-demo realm pre-imported). Fresh clone + `docker compose up -d`
# gives you a working token endpoint at localhost:8180 with known client creds
# (client_id=mcp-demo-client, client_secret=mcp-demo-secret). Mocapi 0.10.0+
# auto-derives `mocapi.oauth2.resource` from the single configured audience,
# so this block is literally the minimum config: issuer + audience + jwks.
#
# Override via environment variables to point at a different IdP — e.g. Auth0
# in staging via SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI and
# friends. Standard Spring Boot env-var name convention; no profiles needed.
# ---------------------------------------------------------------------------
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/mocapi-demo
spring.security.oauth2.resourceserver.jwt.audiences=http://localhost:8080/mcp
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/mocapi-demo/protocol/openid-connect/certs

# ---------------------------------------------------------------------------
# MCP tool descriptions. Externalized so the Java code stays scannable; the
# text still ends up in the tool schema via Mocapi's ${...} resolution.
# ---------------------------------------------------------------------------

tools.catalog.service-lookup.description=Look up a single service by short name. Returns the owner team, business domain, lifecycle stage (ACTIVE / DEPRECATED / RETIRING), compliance tags (pii, pci, soc2-scope, customer-facing, gdpr), repo URL, runbook URL, and direct dependency / dependent counts. Use this when asked about a specific service \u2014 who owns it, what it does, whether it is still active, or where its code and runbook live.
tools.catalog.team-lookup.description=Look up a team by short name. Returns the on-call rotation handle (PagerDuty, Slack group, etc.), the team's primary Slack channel, and the number of services the team owns. Use this when asked who to contact, who is on-call, which Slack to ping, or how big a team's surface area is.
tools.catalog.services-list.description=List services across the catalog, optionally filtered by business domain, compliance tag (pii, pci, soc2-scope, customer-facing, foundation, gdpr), or lifecycle stage. Use this for discovery-shaped questions like "what services handle PII", "which services are deprecated", "what's in the checkout domain", or anything starting with "show me all services that...". Results are paginated.
tools.catalog.teams-list.description=List all engineering teams with the number of services each one owns. Use this for org-chart-shaped questions like "what teams do we have", "which team is biggest", or to enumerate teams before drilling into any one of them. Results are paginated.
tools.catalog.service-dependencies.description=List what a service depends on \u2014 its outbound calls, reads, and event publications. Set transitive=true to get the full downstream tree of everything the service transitively relies on. Use this when asked "what does X use", "what does X depend on", "what are X's upstream systems", or to enumerate a service's outbound surface area.
tools.catalog.service-dependents.description=List what depends on a service \u2014 its inbound callers, readers, and event consumers. Set transitive=true to get the full upstream caller tree. Use this when asked "what calls X", "what uses X", "who consumes X", or to scope a deprecation / refactor. For the "who gets paged if X breaks" question, prefer blast-radius \u2014 it returns the same reachability answer grouped by owning team with on-call rotations.
tools.catalog.blast-radius.description=Compute the full impact of a service failure. Returns every transitively-impacted downstream service, grouped by owning team with each team's on-call rotation and Slack channel, plus a count of orphaned (unowned) services in the radius. Use this when asked "who gets paged if X breaks", "what's the blast radius of X", "what's the impact of taking X down", "who needs to know about an X outage", or drafting a maintenance-window comms list.
tools.catalog.orphaned-services.description=List services with no assigned owning team \u2014 orphans, unowned, unassigned, nobody-is-on-call services. Use this when asked about ownership gaps, services nobody owns, services without a team to contact, or auditing team coverage. Orphaned services with compliance tags (pci, soc2-scope, pii) are the 2-a.m. pages nobody wants to answer.
tools.catalog.deprecated-in-use.description=List deprecated services that are still being called, together with the active services that call them. Use this for migration-backlog and tech-debt questions: "what do we need to sunset", "what legacy services are still in use", "what's our deprecation debt", "which services need migration plans", or "what's blocking us from turning off service X".

tools.feedback.submit-feedback.description=Submit ONE piece of feedback about a specific friction you experienced using this MCP server's tools during this conversation.\n\n\
USE THIS WHEN you hit a concrete friction such as:\n\
\  - A tool's response was missing a field you needed, forcing a follow-up call.\n\
\  - You had to make multiple calls to assemble information that should have been one call.\n\
\  - A tool's input shape didn't naturally match how the user asked the question.\n\
\  - A field or tool name was ambiguous and you had to guess its meaning.\n\
\  - A tool returned data in a shape that was awkward to reason about.\n\n\
DO NOT USE THIS FOR:\n\
\  - General praise ("the tools were great").\n\
\  - Brand-new tool ideas \u2014 use suggest-tool instead. This tool is for friction with tools that already exist.\n\
\  - Feedback you didn't actually experience \u2014 fabricated feedback is worse than silence.\n\n\
If you didn't hit any friction, do not call this tool at all \u2014 that silence is itself the most useful signal. Submit one call per distinct friction. Maintainers review aggregated feedback to evolve this server's design.
tools.feedback.submit-feedback.tool-name.description=Short name of the tool that caused the friction (e.g. 'services-list'). Use 'none' if the friction is the absence of a tool.
tools.feedback.submit-feedback.type.description=Category of friction. One of: MISSING_FIELD, EXTRA_ROUND_TRIPS, AWKWARD_SCHEMA, AMBIGUOUS_NAMING, AWKWARD_RESPONSE_SHAPE.
tools.feedback.submit-feedback.description-param.description=What you tried, what happened, and why it was awkward. 1-3 sentences. Be specific \u2014 name the fields, name the calls, quote the exact value if it matters.
tools.feedback.submit-feedback.suggested-change.description=Concrete suggested change. State a position: 'add field X to ServiceDto', 'split services-list into two tools', 'rename field Y to Z'. If you can't articulate a concrete change, the friction probably isn't real enough to submit.

tools.feedback.suggest-tool.description=Propose a brand-new tool this MCP server should add. Use this when, after completing a task, you noticed: "I kept needing X but no single tool gave me X cleanly."\n\n\
USE THIS WHEN:\n\
\  - You finished a multi-step task and a single hypothetical tool would have replaced several actual calls.\n\
\  - You hit a question this session that no existing tool answers, and you worked around the absence by composing other tools awkwardly.\n\
\  - The proposed tool would address a recurring pattern of question, not a one-off curiosity.\n\n\
DO NOT USE THIS FOR:\n\
\  - Small additions to an existing tool (a missing field, a new filter, a renamed parameter). Use submit-feedback instead \u2014 that's a friction report on an existing tool, not a new tool.\n\
\  - Tools you didn't actually need this session. "Wouldn't it be nice if..." proposals are noise; ground every proposal in a question you actually had to answer.\n\
\  - Proposals where you can't articulate what existing tools you tried first. If the existingToolGap field would be vague, the proposal isn't grounded enough \u2014 don't submit.\n\n\
Submit one call per distinct proposal. If you didn't need a new tool this session, do not call this \u2014 silence is the most useful signal.
tools.feedback.suggest-tool.proposed-name.description=Short kebab-case name you'd give the tool, e.g. 'service-runbook-history'.
tools.feedback.suggest-tool.purpose.description=One sentence: what the tool would return and which question it would answer.
tools.feedback.suggest-tool.inputs.description=Free-form description of inputs the tool would take. Name the params and types, e.g. 'name: string (required), since: ISO date (optional)'.
tools.feedback.suggest-tool.output.description=Free-form description of the output shape, e.g. 'list of {revision, author, date, summary} ordered newest-first'.
tools.feedback.suggest-tool.motivating-question.description=The actual user question from this session that made you want this tool. Quote it if possible.
tools.feedback.suggest-tool.existing-tool-gap.description=Which existing tools you tried for this question and why they didn't suffice. If you can't be specific here, don't submit.
tools.feedback.suggest-tool.frequency.description=How often this tool would be needed: ONCE_THIS_SESSION (truly one-off), RECURRING_PATTERN (you'd reach for it across many sessions), or FOUNDATIONAL (would unblock entire categories of questions).
